name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: relayforge
          POSTGRES_USER: relayforge
          POSTGRES_PASSWORD: relayforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U relayforge -d relayforge
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      SECRET_KEY: ci-secret-key-ci-secret-key-ci-secret-key
      DATABASE_URL: postgresql+asyncpg://relayforge:relayforge@localhost:5432/relayforge
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      WEBHOOK_SIGNING_SECRET: ci-webhook-signing-secret-ci-webhook
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -U pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .
      - run: mypy app
      - run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80
